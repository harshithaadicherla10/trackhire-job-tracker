<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
.card {
    border-radius: 12px;
}
.btn-primary:hover {
    transform: scale(1.02);
    transition: 0.2s;
}
.input-group-text {
    background-color: #f1f3f5;
}
footer small {
    line-height: 1.6;
}
.form-control:focus {
    box-shadow: none;
    border-color: #0d6efd;
}
.nav-link:hover {
    background-color: #343a40;
}
@media (max-width: 991px) {
    .navbar-collapse {
        background-color: #212529;
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
    }

    .nav-link {
        padding: 10px;
    }
}
</style>
</head>
<body style="background-color:#f5f7fb; display:flex; flex-direction:column; min-height:100vh;">

 <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

    <!-- Brand -->
    <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-briefcase-fill me-2"></i>TrackHire
    </a>

    <!-- Toggler -->
    <button class="navbar-toggler border-0" type="button" 
    data-bs-toggle="collapse" 
    data-bs-target="#navbarNav">
    <i class="bi bi-list text-white fs-3"></i>
</button>

    <!-- Links -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

        <!-- RIGHT SIDE -->
        <ul class="navbar-nav text-center">

            <li class="nav-item mb-2">
                <a class="nav-link px-3 rounded" href="/about">
                    <i class="bi bi-info-circle me-1"></i>About
                </a>
            </li>

            <li class="nav-item mb-2">
                <a class="nav-link px-3 rounded" href="/contact">
                    <i class="bi bi-envelope me-1"></i>Contact
                </a>
            </li>

        </ul>

    </div>

</nav>

<div class="container d-flex justify-content-center align-items-center flex-grow-1" style="min-height: calc(100vh - 120px);">

    <div class="card shadow-lg p-4" style="max-width:400px; width:100%;">
        <h3 class="text-center mb-3">
    <i class="bi bi-person-plus me-2"></i>Register
</h3>

        <form method="POST">

    <!-- Name -->
    <div class="input-group mb-3">
        <span class="input-group-text">
            <i class="bi bi-person"></i>
        </span>
        <input type="text" name="username" class="form-control" placeholder="Full Name" required>
    </div>

    <!-- Email -->
    <div class="input-group mb-3">
        <span class="input-group-text">
            <i class="bi bi-envelope"></i>
        </span>
        <input type="email" name="email" class="form-control" placeholder="Email" required>
    </div>

    <!-- Password -->
    <div class="input-group mb-3">
        <span class="input-group-text">
            <i class="bi bi-lock"></i>
        </span>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>

    <!-- Button -->
    <button class="btn btn-primary w-100 mb-3">
        <i class="bi bi-person-plus me-1"></i> Register
    </button>

</form>

        <div class="text-center mt-3">
            <a href="/login">Already have an account? Login</a>
        </div>
    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-auto border-top border-secondary">
    <small>
        © 2026 <strong>TrackHire</strong><br>
        Made with <i class="bi bi-heart-fill text-danger"></i> by Harshitha<br>
        All rights reserved
    </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
