<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .card {
            border-radius: 12px;
        }
        .btn-success:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #198754;
        }
    </style>
</head>
<body style="background-color:#f5f7fb; display:flex; flex-direction:column; min-height:100vh;">

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

    <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-briefcase-fill me-2"></i>TrackHire
    </a>

    <button class="navbar-toggler border-0" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">
        <i class="bi bi-list text-white fs-3"></i>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

        <ul class="navbar-nav align-items-center">

            <li class="nav-item">
                <a class="nav-link me-3" href="/">
                    <i class="bi bi-speedometer2 me-1"></i>Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="/logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </a>
            </li>

        </ul>

    </div>

</nav>

<!-- ✅ CENTERED FORM -->
<div class="container d-flex justify-content-center align-items-center flex-grow-1">

    <div class="card shadow-lg p-4" style="max-width:500px; width:100%;">
        <h3 class="text-center mb-4">
            <i class="bi bi-pencil-square me-2"></i>Edit Job
        </h3>

        <form method="POST">

            <!-- Company -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-building"></i>
                </span>
                <input name="company" value="{{ job.company }}" class="form-control" required>
            </div>

            <!-- Role -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-briefcase"></i>
                </span>
                <input name="role" value="{{ job.role }}" class="form-control" required>
            </div>

            <!-- Status -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-flag"></i>
                </span>
                <select name="status" class="form-select">
                    <option {% if job.status=='Applied' %}selected{% endif %}>Applied</option>
                    <option {% if job.status=='Interview' %}selected{% endif %}>Interview</option>
                    <option {% if job.status=='Offer' %}selected{% endif %}>Offer</option>
                    <option {% if job.status=='Rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </div>

            <!-- Date -->
            <div class="input-group mb-3">
                <span class="input-group-text">
                    <i class="bi bi-calendar"></i>
                </span>
                <input type="date" name="date" value="{{ job.date_applied }}" class="form-control">
            </div>

            <!-- Button -->
            <button class="btn btn-success w-100">
                <i class="bi bi-check-circle me-1"></i> Update
            </button>

        </form>

    </div>

</div>

<!-- ✅ FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-auto border-top border-secondary">
    <small>
        © 2026 <strong>TrackHire</strong><br>
        Made with <i class="bi bi-heart-fill text-danger"></i> by Harshitha<br>
        All rights reserved
    </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
